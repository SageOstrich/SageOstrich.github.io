<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Quentin Tremblay</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0908;--bg2:#111010;--card:#141312;--card2:#1a1917;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --amber:#6366f1;--amber2:#818cf8;--amber-dim:rgba(99,102,241,0.12);--amber-glow:rgba(99,102,241,0.3);
  --teal:#a855f7;--teal-dim:rgba(168,85,247,0.1);
  --text:#f0f0ff;--text2:#b4b4cc;--muted:#6b6b80;--muted2:#44445a;
  --success:#4ade80;--radius:20px;
}
html{scroll-behavior:smooth}
body{
  min-height:100vh;background:var(--bg);
  font-family:'Outfit',sans-serif;color:var(--text);
  display:flex;flex-direction:column;align-items:center;
  padding:48px 20px 80px;position:relative;overflow-x:hidden;
}
body::before{
  content:'';position:fixed;inset:0;
  background-image:radial-gradient(circle,rgba(255,255,255,0.055) 1px,transparent 1px);
  background-size:28px 28px;pointer-events:none;z-index:0;
}
body::after{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse 55% 45% at 15% 10%, rgba(99,102,241,0.18) 0%,transparent 55%),
    radial-gradient(ellipse 45% 40% at 85% 85%, rgba(168,85,247,0.15) 0%,transparent 55%),
    radial-gradient(ellipse 35% 30% at 80% 10%, rgba(99,102,241,0.08) 0%,transparent 50%),
    radial-gradient(ellipse 40% 35% at 20% 88%, rgba(168,85,247,0.08) 0%,transparent 50%);
  pointer-events:none;z-index:0;
}

/* Floating orbs behind card */
.bg-orb{
  position:fixed;border-radius:50%;pointer-events:none;z-index:0;
  filter:blur(70px);opacity:0.5;
}
.bg-orb-1{
  width:380px;height:380px;
  background:radial-gradient(circle, rgba(99,102,241,0.35) 0%, transparent 70%);
  top:-80px;left:calc(50% - 300px);
  animation:orbDrift1 12s ease-in-out infinite;
}
.bg-orb-2{
  width:320px;height:320px;
  background:radial-gradient(circle, rgba(168,85,247,0.3) 0%, transparent 70%);
  bottom:-60px;right:calc(50% - 280px);
  animation:orbDrift2 15s ease-in-out infinite;
}
.bg-orb-3{
  width:200px;height:200px;
  background:radial-gradient(circle, rgba(139,92,246,0.2) 0%, transparent 70%);
  top:40%;left:calc(50% + 200px);
  animation:orbDrift3 18s ease-in-out infinite;
}
@keyframes orbDrift1{0%,100%{transform:translate(0,0)}50%{transform:translate(40px,30px)}}
@keyframes orbDrift2{0%,100%{transform:translate(0,0)}50%{transform:translate(-35px,-25px)}}
@keyframes orbDrift3{0%,100%{transform:translate(0,0)}50%{transform:translate(-20px,35px)}}

/* Card with animated gradient border */
.card-wrapper{
  position:relative;max-width:720px;width:100%;z-index:1;
  border-radius:calc(var(--radius) + 2px);padding:1.5px;
  background:linear-gradient(135deg,rgba(99,102,241,0.7),rgba(168,85,247,0.4),rgba(99,102,241,0.2),rgba(168,85,247,0.6));
  background-size:300% 300%;
  animation:borderShift 7s ease infinite;
}
@keyframes borderShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}

.card{
  background:var(--card);border-radius:var(--radius);overflow:hidden;
  animation:cardIn 0.6s cubic-bezier(0.16,1,0.3,1) both;
}
@keyframes cardIn{from{opacity:0;transform:translateY(28px) scale(0.98)}to{opacity:1;transform:translateY(0) scale(1)}}

/* Header */
.card-header{
  padding:30px 40px 22px;border-bottom:1px solid var(--border);
  background:linear-gradient(180deg,rgba(99,102,241,0.05) 0%,transparent 100%);
}
.header-row{display:flex;align-items:center;justify-content:space-between;gap:16px}
.header-left{display:flex;align-items:center;gap:14px}

.avatar{
  width:44px;height:44px;border-radius:13px;
  background:linear-gradient(135deg,var(--amber),var(--teal));
  display:flex;align-items:center;justify-content:center;
  font-family:'JetBrains Mono',monospace;font-size:0.82rem;font-weight:700;color:#000;
  flex-shrink:0;box-shadow:0 0 20px var(--amber-glow),0 0 40px rgba(99,102,241,0.1);
  position:relative;
}
.avatar::after{
  content:'';position:absolute;inset:-1px;border-radius:14px;
  background:linear-gradient(135deg,var(--amber),var(--teal));
  z-index:-1;opacity:0.4;filter:blur(8px);
}

.site-name{
  font-family:'Instrument Serif',serif;font-size:1.4rem;
  color:var(--text);text-decoration:none;cursor:pointer;
  background:none;border:none;letter-spacing:-0.01em;
}
.site-name em{color:var(--amber);font-style:italic}

.header-badge{
  display:flex;align-items:center;gap:7px;
  font-family:'JetBrains Mono',monospace;font-size:0.63rem;font-weight:500;
  color:var(--success);background:rgba(74,222,128,0.07);
  border:1px solid rgba(74,222,128,0.18);border-radius:20px;
  padding:6px 13px;white-space:nowrap;
}
.header-badge::before{
  content:'';width:6px;height:6px;border-radius:50%;
  background:var(--success);animation:pulse 2s ease infinite;
  box-shadow:0 0 6px var(--success);
}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.4;transform:scale(0.8)}}

/* Nav */
.card-nav{
  padding:0 40px;display:flex;border-bottom:1px solid var(--border);
  overflow-x:auto;scrollbar-width:none;background:rgba(0,0,0,0.25);
}
.card-nav::-webkit-scrollbar{display:none}

.nav-link{
  display:block;padding:13px 13px;
  font-family:'JetBrains Mono',monospace;font-size:0.68rem;font-weight:500;
  color:var(--muted);text-decoration:none;border:none;background:none;
  border-bottom:2px solid transparent;margin-bottom:-1px;
  transition:color .2s,border-color .2s;white-space:nowrap;cursor:pointer;
  letter-spacing:0.02em;
}
.nav-link:hover{color:var(--text2)}
.nav-link.active{color:var(--amber);border-bottom-color:var(--amber);text-shadow:0 0 14px var(--amber-glow)}

/* Content */
@keyframes pageIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.card-content{padding:40px;animation:pageIn 0.3s ease both}

/* Typography */
.page-eyebrow{
  font-family:'JetBrains Mono',monospace;font-size:0.62rem;
  color:var(--amber);letter-spacing:0.2em;text-transform:uppercase;
  margin-bottom:10px;opacity:0.8;
}
.page-title{
  font-family:'Instrument Serif',serif;font-size:2.1rem;font-weight:400;
  letter-spacing:-0.02em;color:var(--text);margin-bottom:8px;line-height:1.1;
}
.page-title em{color:var(--amber);font-style:italic}
.page-subtitle{font-size:0.9rem;color:var(--muted);margin-bottom:36px;line-height:1.6;font-weight:300}
.divider{height:1px;background:var(--border);margin:28px 0}

/* Info chips */
.info-chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:28px}
.chip{
  display:flex;align-items:center;gap:7px;padding:7px 14px;
  background:var(--card2);border:1px solid var(--border);border-radius:10px;
  font-size:0.8rem;color:var(--text2);font-weight:400;transition:border-color .2s;
}
.chip:hover{border-color:var(--border2)}

/* About */
.about-body{display:flex;flex-direction:column;gap:14px;margin-bottom:28px}
.about-body p{font-size:0.93rem;line-height:1.8;color:var(--text2);font-weight:300}
.placeholder{
  padding:18px 20px;background:var(--amber-dim);
  border:1px dashed rgba(245,158,11,0.28);border-radius:12px;
  font-size:0.85rem;color:var(--amber2);line-height:1.65;
}
.inline-link{
  color:var(--amber);text-decoration:none;font-weight:500;
  border-bottom:1px solid rgba(245,158,11,0.3);transition:border-color .15s;
  cursor:pointer;background:none;
  border-top:none;border-left:none;border-right:none;
  font-family:'Outfit',sans-serif;font-size:inherit;padding:0;
}
.inline-link:hover{border-bottom-color:var(--amber)}

/* Projects */
.project-list{display:flex;flex-direction:column;gap:16px}
.project-card{
  background:var(--card2);border:1px solid var(--border);border-radius:16px;
  padding:26px;transition:border-color .25s,transform .25s,box-shadow .25s;
  position:relative;overflow:hidden;
}
.project-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--amber),transparent);
  opacity:0;transition:opacity .3s;
}
.project-card:hover{
  border-color:rgba(245,158,11,0.22);transform:translateY(-3px);
  box-shadow:0 8px 32px rgba(245,158,11,0.05),0 2px 8px rgba(0,0,0,0.4);
}
.project-card:hover::before{opacity:1}

.project-header{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:10px}
.project-name{font-family:'Instrument Serif',serif;font-size:1.12rem;color:var(--text);letter-spacing:-0.01em}
.project-gh{
  font-family:'JetBrains Mono',monospace;font-size:0.65rem;color:var(--amber);
  text-decoration:none;padding:5px 11px;border:1px solid rgba(245,158,11,0.22);
  border-radius:6px;background:var(--amber-dim);white-space:nowrap;flex-shrink:0;transition:background .15s;
}
.project-gh:hover{background:rgba(245,158,11,0.18)}
.project-gh.hidden{display:none}
.project-desc{font-size:0.87rem;color:var(--muted);line-height:1.7;margin-bottom:14px;font-weight:300}
.project-detail{font-size:0.81rem;color:var(--text2);line-height:1.6;margin-bottom:7px}
.project-detail strong{color:var(--amber2);font-weight:600}
.tag-row{display:flex;flex-wrap:wrap;gap:7px;margin-top:14px}
.tag{
  font-family:'JetBrains Mono',monospace;font-size:0.63rem;padding:4px 10px;
  border-radius:6px;background:rgba(255,255,255,0.04);color:var(--muted);
  border:1px solid var(--border);letter-spacing:0.03em;
}
.tag.hi{background:var(--amber-dim);color:var(--amber2);border-color:rgba(245,158,11,0.18)}
.tag.teal{background:var(--teal-dim);color:var(--teal);border-color:rgba(45,212,191,0.18)}
.add-hint{
  display:flex;align-items:center;justify-content:center;padding:18px;
  border:1px dashed var(--muted2);border-radius:14px;
  font-family:'JetBrains Mono',monospace;font-size:0.68rem;
  color:var(--muted2);margin-top:4px;letter-spacing:0.05em;
}

/* Skills */
.skill-group{margin-bottom:26px}
.skill-group:last-child{margin-bottom:0}
.skill-label{
  font-family:'JetBrains Mono',monospace;font-size:0.6rem;color:var(--muted);
  text-transform:uppercase;letter-spacing:0.18em;margin-bottom:12px;
  display:flex;align-items:center;gap:10px;
}
.skill-label::after{content:'';flex:1;height:1px;background:var(--border)}
.skill-tags{display:flex;flex-wrap:wrap;gap:8px}
.skill-tag{
  font-family:'JetBrains Mono',monospace;font-size:0.73rem;padding:8px 15px;
  border-radius:10px;background:var(--card2);color:var(--text2);
  border:1px solid var(--border);transition:all .2s;cursor:default;
}
.skill-tag:hover{background:var(--amber-dim);color:var(--amber);border-color:rgba(245,158,11,0.28);transform:translateY(-1px)}
.skill-tag.main{background:var(--amber-dim);color:var(--amber);border-color:rgba(245,158,11,0.22)}
.skill-tag.teal{background:var(--teal-dim);color:var(--teal);border-color:rgba(45,212,191,0.18)}

/* Writing */
.writing-list{display:flex;flex-direction:column;gap:12px}
.writing-card{
  background:var(--card2);border:1px solid var(--border);border-radius:14px;
  padding:22px 26px;text-decoration:none;color:inherit;display:block;
  transition:border-color .2s,transform .2s,box-shadow .2s;
  position:relative;overflow:hidden;
}
.writing-card::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:2px;
  background:linear-gradient(180deg,var(--amber),var(--teal));opacity:0;transition:opacity .2s;
}
.writing-card:hover{border-color:rgba(245,158,11,0.2);transform:translateX(4px);box-shadow:0 4px 20px rgba(0,0,0,0.3)}
.writing-card:hover::before{opacity:1}
.writing-meta{display:flex;gap:8px;align-items:center;margin-bottom:9px}
.writing-type{
  font-family:'JetBrains Mono',monospace;font-size:0.58rem;font-weight:700;
  text-transform:uppercase;letter-spacing:0.12em;padding:3px 8px;border-radius:4px;
  background:var(--amber-dim);color:var(--amber);border:1px solid rgba(245,158,11,0.18);
}
.writing-date{font-family:'JetBrains Mono',monospace;font-size:0.62rem;color:var(--muted)}
.writing-title{font-family:'Instrument Serif',serif;font-size:1.05rem;color:var(--text);margin-bottom:6px;letter-spacing:-0.01em}
.writing-desc{font-size:0.83rem;color:var(--muted);line-height:1.6;font-weight:300}

/* Achievements */
.ach-list{display:flex;flex-direction:column;gap:10px;margin-bottom:26px}
.ach-item{
  display:flex;align-items:flex-start;gap:14px;padding:16px 18px;
  background:var(--card2);border:1px solid var(--border);border-radius:12px;transition:border-color .2s;
}
.ach-item:hover{border-color:var(--border2)}
.ach-icon{font-size:1.2rem;flex-shrink:0;margin-top:1px}
.ach-text{font-size:0.85rem;line-height:1.6;color:var(--text2);font-weight:300}
.ach-text strong{font-weight:600;color:var(--text);display:block;margin-bottom:2px}
.future-list{display:flex;flex-direction:column;gap:8px}
.future-item{
  display:flex;align-items:center;gap:12px;padding:13px 18px;
  background:var(--card2);border:1px solid var(--border);border-radius:10px;
  font-size:0.85rem;color:var(--text2);transition:border-color .15s,color .15s;font-weight:300;
}
.future-item:hover{border-color:rgba(245,158,11,0.2);color:var(--text)}
.future-item::before{content:'→';color:var(--amber);font-weight:600;flex-shrink:0}

/* Contact */
.contact-list{display:flex;flex-direction:column;gap:10px}
.contact-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 22px;background:var(--card2);border:1px solid var(--border);
  border-radius:14px;text-decoration:none;color:inherit;
  transition:border-color .2s,background .2s,transform .2s;
}
.contact-item:hover{border-color:rgba(245,158,11,0.22);background:rgba(245,158,11,0.03);transform:translateX(3px)}
.contact-left{display:flex;align-items:center;gap:14px}
.contact-icon{
  width:40px;height:40px;border-radius:11px;
  background:rgba(245,158,11,0.07);border:1px solid rgba(245,158,11,0.13);
  display:flex;align-items:center;justify-content:center;font-size:1.05rem;flex-shrink:0;
}
.contact-lbl{font-family:'JetBrains Mono',monospace;font-size:0.6rem;color:var(--muted);letter-spacing:0.08em;margin-bottom:3px;text-transform:uppercase}
.contact-val{font-size:0.88rem;color:var(--text2);font-weight:400}
.contact-arrow{color:var(--muted2);transition:color .15s,transform .15s}
.contact-item:hover .contact-arrow{color:var(--amber);transform:translateX(3px)}

/* Footer */
.card-footer{
  padding:16px 40px;border-top:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;gap:12px;
  background:rgba(0,0,0,0.2);
}
.footer-text{font-family:'JetBrains Mono',monospace;font-size:0.6rem;color:var(--muted2);letter-spacing:0.06em}
.footer-links{display:flex;gap:16px}
.footer-links a{font-family:'JetBrains Mono',monospace;font-size:0.6rem;color:var(--muted);text-decoration:none;transition:color .15s;letter-spacing:0.04em}
.footer-links a:hover{color:var(--amber)}

/* Misc */
.tip-box{margin-top:24px;padding:14px 18px;background:var(--amber-dim);border:1px dashed rgba(245,158,11,0.22);border-radius:10px;font-family:'JetBrains Mono',monospace;font-size:0.7rem;color:var(--amber2);line-height:1.6}
code{background:rgba(255,255,255,0.07);padding:2px 6px;border-radius:4px;font-family:'JetBrains Mono',monospace;font-size:0.85em;color:var(--teal)}

@media(max-width:580px){
  body{padding:0 0 60px}
  .card-wrapper{border-radius:0;padding:0;background:none}
  .card{border-radius:0;min-height:100vh}
  .card-header,.card-nav,.card-content,.card-footer{padding-left:22px;padding-right:22px}
  .header-badge{display:none}
  .page-title{font-size:1.8rem}
}
</style>
</head>
<body>

<div class="bg-orb bg-orb-1"></div>
<div class="bg-orb bg-orb-2"></div>
<div class="bg-orb bg-orb-3"></div>

<div class="card-wrapper">
<div class="card">

  <header class="card-header">
    <div class="header-row">
      <div class="header-left">
        <div class="avatar">QT</div>
        <button class="site-name" onclick="navigate('about')">Quentin <em>Tremblay</em></button>
      </div>
      <span class="header-badge">open to opportunities</span>
    </div>
  </header>

  <nav class="card-nav" id="nav">
    <button class="nav-link" data-page="about"        onclick="navigate('about')">~/about</button>
    <button class="nav-link" data-page="projects"     onclick="navigate('projects')">~/projects</button>
    <button class="nav-link" data-page="skills"       onclick="navigate('skills')">~/skills</button>
    <button class="nav-link" data-page="writing"      onclick="navigate('writing')">~/writing</button>
    <button class="nav-link" data-page="achievements" onclick="navigate('achievements')">~/achievements</button>
    <button class="nav-link" data-page="contact"      onclick="navigate('contact')">~/contact</button>
  </nav>

  <main class="card-content" id="content"></main>

  <footer class="card-footer">
    <span class="footer-text">© 2026 quentin tremblay</span>
    <div class="footer-links">
      <a href="https://github.com/SageOstrich" target="_blank">github</a>
      <a href="#" onclick="navigate('contact');return false;">contact</a>
    </div>
  </footer>

</div>
</div>

<script>
const pages = {
  about: `
    <p class="page-eyebrow">01 — introduction</p>
    <h1 class="page-title">Hey, I'm <em>Quentin</em> 👋</h1>
    <p class="page-subtitle">Engineering student · Augusta, Maine</p>
    <div class="info-chips">
      <span class="chip">📍 Augusta, Maine, US</span>

      <div class="placeholder">

      Check out my <button class="inline-link" onclick="navigate('projects')">projects</button>,
      explore my <button class="inline-link" onclick="navigate('skills')">skills</button>,
      or <button class="inline-link" onclick="navigate('contact')">get in touch</button>.
    </p>`,

  projects: `
    <p class="page-eyebrow">02 — work</p>
    <h1 class="page-title">Projects</h1>
    <p class="page-subtitle">Things I've built, broken, and learned from.</p>
    <div class="project-list">
      <div class="project-card">
        <div class="project-header">
          <span class="project-name">Project Name Here</span>
          <a href="#" class="project-gh hidden">⬡ github</a>
        </div>
        <p class="project-desc">Write a short description of what this project does. What is it? What can it do?</p>
        <p class="project-detail"><strong>Problem it solves:</strong> What issue or need does this address?</p>
        <p class="project-detail"><strong>What I learned:</strong> What new skills or insights did you gain?</p>
        <div class="tag-row">
          <span class="tag hi">technology-1</span>
          <span class="tag">technology-2</span>
          <span class="tag teal">technology-3</span>
        </div>
      </div>
      <div class="project-card">
        <div class="project-header">
          <span class="project-name">Project Name Here</span>
          <a href="#" class="project-gh hidden">⬡ github</a>
        </div>
        <p class="project-desc">Write a short description of what this project does.</p>
        <p class="project-detail"><strong>Problem it solves:</strong> What issue or need does this address?</p>
        <p class="project-detail"><strong>What I learned:</strong> What new skills or insights did you gain?</p>
        <div class="tag-row">
          <span class="tag hi">technology-1</span>
          <span class="tag">technology-2</span>
          <span class="tag teal">technology-3</span>
        </div>
      </div>
    </div>
    <div class="add-hint" style="margin-top:14px">// no projects yet — fill these in!</div>`,

  skills: `
    <p class="page-eyebrow">03 — toolkit</p>
    <h1 class="page-title">Skills & Tools</h1>
    <p class="page-subtitle">Languages, software, and concepts I work with.</p>
    <div class="skill-group">
      <p class="skill-label">languages</p>
      <div class="skill-tags">

function navigate(page) {
  const content = document.getElementById('content');
  content.style.animation = 'none';
  void content.offsetHeight;
  content.style.animation = '';
  content.innerHTML = pages[page];
  document.querySelectorAll('.nav-link').forEach(b =>
    b.classList.toggle('active', b.dataset.page === page)
  );
}
